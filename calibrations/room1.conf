# Touchscreen calibration for room1
# Using identity matrix: edge-to-edge coverage is more important than
# sub-cm precision for a classroom interactive whiteboard.
# The projected image closely matches the touch frame already.
TOUCH_DEVICE="Touch p403 Touch Device,82-46P"
DISPLAY_OUTPUT="VGA-1"
DRIVER="libinput"
CALIB_MATRIX="1 0 0 0 1 0 0 0 1"
