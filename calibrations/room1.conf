# Touchscreen calibration for room1
# Strategy: xrandr transform shrinks projected image to fit touch frame,
# then identity touch matrix gives full edge-to-edge accuracy.
TOUCH_DEVICE="Touch p403 Touch Device,82-46P"
DISPLAY_OUTPUT="VGA-1"
DRIVER="libinput"
CALIB_MATRIX="1 0 0 0 1 0 0 0 1"
XRANDR_TRANSFORM="1.0999,0,-57.19,0,1.0,0,0,0,1"
# Original xinput_calibrator values (for reference):
# MinX=-3664 MaxX=68399 MinY=1344 MaxY=67050
